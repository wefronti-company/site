name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  # Google Analytics – configurar em Settings > Secrets and variables > Actions
  NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}

jobs:
  # Job 1: Lint and Type Check
  quality-checks:
    name: 'Step 1: Quality Checks'
    runs-on: ubuntu-latest
    
    steps:
      - name: 1.1 - Checkout code
        uses: actions/checkout@v4
        
      - name: 1.2 - Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: 1.3 - Install dependencies
        run: npm ci
        
      - name: 1.4 - Run TypeScript type check
        run: npx tsc --noEmit
        
      - name: 1.5 - Check code formatting
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,css,md}"
        continue-on-error: true

  # Job 2: Build Test (usa NEXT_PUBLIC_GA_ID do env global para build consistente)
  build-test:
    name: 'Step 2: Build Verification'
    runs-on: ubuntu-latest
    needs: quality-checks
    env:
      NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
    
    steps:
      - name: 2.1 - Checkout code
        uses: actions/checkout@v4
        
      - name: 2.2 - Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: 2.3 - Install dependencies
        run: npm ci
        
      - name: 2.4 - Build application
        run: npm run build
        
      - name: 2.4.5 - Debug .next contents
        run: |
          echo "=== Debug: .next contents ==="
          if [ -d .next ]; then
            du -sh .next || true
            ls -la .next | sed -n '1,200p'
          else
            echo ".next does not exist after build"
            ls -la || true
          fi
      
      - name: 2.4.6 - Archive .next as build-output.tar.gz
        run: |
          if [ -d .next ]; then
            tar -czf build-output.tar.gz .next
            echo "archive size:"
            ls -lh build-output.tar.gz
          else
            echo "No .next to archive; skipping tar creation"
            exit 1
          fi

      - name: 2.5 - Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.tar.gz
  deploy-preview:
    name: 'Step 3: Deploy Preview'
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'pull_request'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    
    steps:
      - name: 3.1 - Checkout code
        uses: actions/checkout@v4
        
      - name: 3.2 - Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: 3.3 - Install Vercel CLI
        run: npm install --global vercel@latest
        
      - name: 3.4 - Pull Vercel environment
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
        
      - name: 3.5 - Build project artifacts
        run: vercel build --token="$VERCEL_TOKEN"
        
      - name: 3.6 - Deploy to Vercel Preview
        id: deploy-preview
        run: |
          url=$(vercel deploy --token="$VERCEL_TOKEN")
          echo "url=$url" >> $GITHUB_OUTPUT
          
      - name: 3.7 - Comment PR with preview URL
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployment ready!\n\n✅ Preview URL: ${{ steps.deploy-preview.outputs.url }}\n\n_Deployed from commit ${{ github.sha }}_`
            })

  # Job 4: Deploy Production (Main Branch)
  deploy-production:
    name: 'Step 4: Deploy Production'
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://wefronti.com
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SECURITY_LOG_SECRET: ${{ secrets.SECURITY_LOG_SECRET }}
    
    steps:
      - name: 4.1 - Checkout code
        uses: actions/checkout@v4
        
      - name: 4.2 - Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: 4.2.5 - Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./

      - name: 4.2.6 - Verify / Extract .next artifact (or fallback)
        run: |
          echo "Checking for build-output artifact..."
          if [ -f build-output.tar.gz ]; then
            echo "Found build-output.tar.gz. Listing archive contents..."
            tar -tzf build-output.tar.gz | sed -n '1,200p' || true
            echo "Extracting archive..."
            tar -xzf build-output.tar.gz || { echo "Extraction failed"; exit 1; }
            echo "Listing extracted .next"
            ls -la .next | sed -n '1,200p' || true
          elif [ -d .next ]; then
            echo ".next present in workspace. Listing:"
            ls -la .next | sed -n '1,200p' || true
          else
            echo "No artifact found. Attempting to build here as fallback..."
            npm ci
            npm run vercel-build || { echo "Fallback build failed"; exit 1; }
            ls -la .next | sed -n '1,200p' || true
          fi

      - name: 4.3 - Install Vercel CLI
        run: npm install --global vercel@latest
        
      - name: 4.4 - Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: 4.4.5 - Sync JWT_SECRET to Vercel (from GitHub)
        if: env.JWT_SECRET != ''
        run: |
          printf '%s' "$JWT_SECRET" | vercel env add JWT_SECRET production --force --token="$VERCEL_TOKEN"

      - name: 4.4.5b - Sync SECURITY_LOG_SECRET to Vercel (from GitHub)
        if: env.SECURITY_LOG_SECRET != ''
        run: |
          printf '%s' "$SECURITY_LOG_SECRET" | vercel env add SECURITY_LOG_SECRET production --force --token="$VERCEL_TOKEN"

      - name: 4.5 - Build project artifacts
        run: vercel build --prod --token="$VERCEL_TOKEN"
        
      - name: 4.6 - Run Vercel production deploy (staged, sem promover ao domínio)
        id: deploy-run
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "Verifying Vercel CLI version"
          vercel --version || true

          echo "Starting Vercel production deploy (atribui direto ao domínio de produção)..."
          outfile=vercel_deploy_output.txt
          vercel deploy --prod --token="$VERCEL_TOKEN" > "$outfile" 2>&1
          echo $? > vercel_deploy_retcode.txt

      - name: 4.7 - Dump deploy output (debug)
        run: |
          echo "---- Begin deploy output (first 300 lines) ----"
          sed -n '1,300p' vercel_deploy_output.txt || true
          echo "---- End deploy output ----"
          echo "---- Hexdump of first 300 bytes (for hidden chars) ----"
          head -c 300 vercel_deploy_output.txt | hexdump -C || true

      - name: 4.8 - Inspect deploy result and fetch logs (if failed)
        id: deploy-analyze
        run: |
          echo "Script path: $0"
          echo "---- Script content start (with line numbers) ----"
          nl -ba "$0" | sed -n '1,200p' || true
          echo "---- Script content end ----"
          set -x
          ret=$(cat vercel_deploy_retcode.txt || echo 0)
          echo "Deploy return code: $ret"
          outfile=vercel_deploy_output.txt
          if [ "$ret" -ne 0 ]; then
            echo "Vercel deploy command returned non-zero exit code: $ret"
            inspect=$(grep -Eo 'https://vercel.com/[^" ]+' "$outfile" | head -n 1 || true)
            prod=$(grep -Eo 'https?://[a-z0-9-]+\.vercel\.app' "$outfile" | head -n 1 || true)
            echo "--- Vercel deploy output ---"
            tail -n 200 "$outfile" || true
            if [ -n "$inspect" ]; then
              echo "Found inspect URL: $inspect"
              echo "Attempting to run 'vercel inspect' to fetch build logs..."
              vercel inspect "$inspect" --token="$VERCEL_TOKEN" 2>&1 | sed -n '1,200p' || true
            fi
            if [ -n "$prod" ]; then
              echo "Found production URL: $prod"
              echo "Fetching recent logs for the production deployment (may require token access)"
              vercel logs "$prod" --token="$VERCEL_TOKEN" --since 10m --limit 200 2>&1 | sed -n '1,500p' || true
            fi
            echo "Failing job due to deployment error"
            exit 1
          fi

          # If successful extract URL and export to GitHub Actions output
          url=$(grep -Eo "https?://[a-z0-9-]+\.vercel\.app" "$outfile" | head -n 1 || true)
          if [ -z "$url" ]; then
            url=$(grep -Eo 'https://vercel.com/[^" ]+' "$outfile" | head -n 1 || true)
          fi
          echo "Deployment completed. URL: $url"
          echo "url=$url" >> $GITHUB_OUTPUT
          
      - name: 4.9 - Smoke tests (critical assets)
        id: smoke-test
        run: |
          set -euo pipefail
          DEPLOY_URL="${{ steps.deploy-analyze.outputs.url }}"
          if [ -z "$DEPLOY_URL" ]; then
            DEPLOY_URL="https://wefronti.com"
          fi
          echo "Using deploy URL: $DEPLOY_URL"

          urls=(
            "$DEPLOY_URL/"
            "$DEPLOY_URL/_next/static/chunks/c3d84ccfed430a4f.js"
            "$DEPLOY_URL/_next/static/chunks/main.js"
          )

          failed=false
          for asset in "${urls[@]}"; do
            echo "Checking: $asset"
            success=false
            for attempt in 1 2 3 4 5; do
              code=$(curl -L -s -o /dev/null -w "%{http_code}" "$asset") || code=000
              if [ "$code" -eq 200 ] || [ "$code" -eq 401 ]; then
                echo "OK: $asset -> $code"
                success=true
                break
              fi
              echo "Attempt $attempt for $asset returned $code; retrying in 5s..."
              sleep 5
            done
            if [ "$success" != "true" ]; then
              echo "SMOKE FAILURE for $asset (last status: $code)"
              echo "--- Verbose headers for $asset ---"
              curl -I -v "$asset" || true
              failed=true
            fi
          done

          if [ "$failed" = "true" ]; then
            echo "One or more smoke tests failed. Site NÃO será promovido."
            exit 1
          fi

      - name: 4.10 - Purge Cloudflare cache (if token configured)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_NAME: wefronti.com
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set — skipping Cloudflare purge"
            exit 0
          fi
          echo "Installing jq for JSON parsing..."
          sudo apt-get update -y && sudo apt-get install -y jq

          echo "Resolving Zone ID for $CF_ZONE_NAME"
          ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=$CF_ZONE_NAME" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')
          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
            echo "Zone ID not found for $CF_ZONE_NAME — skipping purge"
            exit 0
          fi
          echo "Zone ID: $ZONE_ID"

          echo "Aguardando 30s para propagação do Vercel antes do purge..."
          sleep 30

          echo "Purging Cloudflare cache (purge_everything=true)"
          resp=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "Purge response: $resp"
          echo "$resp" | jq -e '.success' >/dev/null || { echo "Cloudflare purge reported failure"; exit 1; }

      - name: 4.10 - Create deployment summary
        env:
          DEPLOY_URL: ${{ steps.deploy-analyze.outputs.url }}
        run: |
          echo "## 🚀 Production Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '✅ **Production URL:**' "$DEPLOY_URL" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "👤 **Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "🕐 **Deployment time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          
      - name: 4.8 - Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Production deployment completed successfully!"
          else
            echo "❌ Production deployment failed!"
            exit 1
          fi

  # Job 5: Post-Deployment Verification — REMOVED
  # The post-deployment verification step was removed per request because the deployment
  # is performed in Step 4. Health checks and monitoring can be handled separately
  # (e.g., via provider health checks or a dedicated monitoring job) if needed.
