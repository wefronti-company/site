name: Manual Cloudflare Purge

on:
  workflow_dispatch:

jobs:
  purge:
    name: Purge Cloudflare Cache
    runs-on: ubuntu-latest
    steps:
      - name: Purge cache via Cloudflare API
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_NAME: wefronti.com
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN secret is not set. Please add it to repository secrets and retry."
            exit 1
          fi
          echo "Installing jq..."
          sudo apt-get update -y && sudo apt-get install -y jq

          echo "Resolving Zone ID for $CF_ZONE_NAME"
          ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=$CF_ZONE_NAME" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')
          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
            echo "Zone ID not found for $CF_ZONE_NAME"
            exit 1
          fi
          echo "Zone ID: $ZONE_ID"

          echo "Purging Cloudflare cache (purge_everything=true)"
          resp=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "Purge response: $resp"
          if ! echo "$resp" | jq -e '.success' >/dev/null; then
            echo "Cloudflare purge reported failure"
            exit 1
          fi
          echo "Cloudflare purge completed successfully."